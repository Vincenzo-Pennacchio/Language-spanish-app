    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="L'app completa per imparare lo spagnolo progettata specificamente per italiani." />
    <meta name="twitter:image" content="%PUBLIC_URL%/icons/icon-512x512.png" />
    
    <title>Aprende Español - App per Imparare lo Spagnolo</title>
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Prevent zoom on input focus (iOS) -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    
    <!-- Loading styles -->
    <style>
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        color: white;
        font-family: 'Inter', sans-serif;
      }
      
      .loading-spinner {
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .loading-text {
        font-size: 1.2rem;
        font-weight: 500;
        text-align: center;
      }
      
      .app-loaded #loading-screen {
        display: none;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="text-align: center; padding: 50px;">
        <h1>JavaScript è richiesto</h1>
        <p>Questa app richiede JavaScript per funzionare. Per favore abilita JavaScript nel tuo browser per continuare.</p>
      </div>
    </noscript>
    
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">
        <div style="font-size: 3rem; margin-bottom: 20px;">🇪🇸</div>
        <div>Caricamento Aprende Español...</div>
        <div style="font-size: 0.9rem; margin-top: 10px; opacity: 0.8;">La tua app per imparare lo spagnolo</div>
      </div>
    </div>
    
    <div id="root"></div>
    
    <!-- PWA Install Script -->
    <script>
      // Hide loading screen when app loads
      window.addEventListener('load', function() {
        document.body.classList.add('app-loaded');
        
        // Remove loading screen after a brief delay
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            loadingScreen.style.transition = 'opacity 0.5s ease';
            setTimeout(() => {
              loadingScreen.remove();
            }, 500);
          }
        }, 1000);
      });
      
      // Service Worker Registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('%PUBLIC_URL%/sw.js')
            .then(function(registration) {
              console.log('SW registered: ', registration);
            })
            .catch(function(registrationError) {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
      
      // PWA Install Prompt
      let deferredPrompt;
      
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        
        // Show install button/banner
        const installBanner = document.createElement('div');
        installBanner.id = 'install-banner';
        installBanner.style.cssText = `
          position: fixed;
          bottom: 20px;
          left: 20px;
          right: 20px;
          background: linear-gradient(135deg, #667eea, #764ba2);
          color: white;
          padding: 15px;
          border-radius: 12px;
          box-shadow: 0 4px 20px rgba(0,0,0,0.3);
          z-index: 1000;
          display: flex;
          justify-content: space-between;
          align-items: center;
          font-family: 'Inter', sans-serif;
        `;
        
        installBanner.innerHTML = `
          <div>
            <div style="font-weight: 600; margin-bottom: 5px;">📱 Installa l'App</div>
            <div style="font-size: 0.9rem; opacity: 0.9;">Aggiungi alla schermata iniziale per un accesso rapido</div>
          </div>
          <button id="install-btn" style="
            background: white;
            color: #667eea;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 10px;
          ">Installa</button>
          <button id="dismiss-btn" style="
            background: none;
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
            opacity: 0.7;
            margin-left: 5px;
          ">✕</button>
        `;
        
        document.body.appendChild(installBanner);
        
        // Install button click
        document.getElementById('install-btn').addEventListener('click', function() {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function(choiceResult) {
              if (choiceResult.outcome === 'accepted') {
                console.log('User accepted the A2HS prompt');
              }
              deferredPrompt = null;
              installBanner.remove();
            });
          }
        });
        
        // Dismiss button click
        document.getElementById('dismiss-btn').addEventListener('click', function() {
          installBanner.remove();
        });
        
        // Auto-hide after 10 seconds
        setTimeout(() => {
          if (document.getElementById('install-banner')) {
            document.getElementById('install-banner').remove();
          }
        }, 10000);
      });
    </script>
  </body>
</html>
